<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Article Browser - Premium</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --content-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: 12px;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 左側導覽列 */
        aside {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            overflow: hidden; /* 防止內容外溢 */
        }

        aside.collapsed {
            width: 0;
            min-width: 0;
            transform: translateX(-100%);
            border-right: none;
            visibility: hidden; /* 完全隱藏 */
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-color), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .favorites-section {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(56, 189, 248, 0.05);
            overflow: hidden;
        }

        .favorites-title {
            font-size: 0.75rem;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 8px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .fav-item {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .category-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .category-item {
            margin-bottom: 8px;
        }

        .category-title {
            padding: 8px 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .law-link {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .law-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .law-link.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
        }

        /* 主顯示區 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            min-width: 0;
        }

        header {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .sidebar-toggle {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-color);
        }

        .options-row {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding-left: 52px; /* 這裡的 52px = 收合按鈕 40px + 間距 12px */
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group input {
            cursor: pointer;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* 內容區 */
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            line-height: 1.8;
        }

        .article-card {
            background: var(--content-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .law-tag {
            font-size: 0.75rem;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .article-title {
            color: var(--accent-color);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .article-body {
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 側邊欄適應 Obsidian */
        @media (max-width: 600px) {
            aside {
                position: absolute;
                z-index: 100;
                height: 100%;
                transform: translateX(-100%);
            }

            aside.open {
                transform: translateX(0);
            }
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <aside id="sidebar">
        <div class="sidebar-header">法典隨身助手</div>
        
        <div class="favorites-section" id="fav-section">
            <div class="favorites-title">⭐ 快速跳轉</div>
            <div id="fav-list">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>

        <div class="category-list" id="law-nav">
            <!-- 由 JS 動態生成 -->
        </div>
    </aside>

    <main>
        <header>
            <div class="search-row">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="收合/展開側邊欄">☰</button>
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="輸入條號 (如: 199-1) 或關鍵字...">
                </div>
                <button class="btn btn-primary" id="btn-search" onclick="handleSearch()">🔍 搜尋</button>
                <button class="btn" style="background:rgba(255,255,255,0.1); color:white" onclick="handleFullText()">📜 全文</button>
                <button class="btn" style="background:rgba(255,255,255,0.1); color:white" onclick="handleCopy()">📋 複製</button>
            </div>
            <div class="options-row">
                <label class="checkbox-group">
                    <input type="checkbox" id="chk-include-name"> 帶入名稱
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="chk-obsidian" checked> Obsidian 格式
                </label>
                <label class="checkbox-group" title="搜尋所有已下載的法規">
                    <input type="checkbox" id="chk-global"> 跨法檢索
                </label>
            </div>
        </header>

        <div id="content-area">
            <div style="text-align: center; margin-top: 100px; color: var(--text-secondary);">
                <h2>請從左側選擇法規</h2>
                <p>或是直接搜尋您想查詢的條文</p>
            </div>
        </div>
    </main>

    <script>
        // 設定配置 (完整版)
        const LAWS_CONFIG = {
            "一、憲法與行政法": {
                "中華民國憲法": "A0000001",
                "憲法增修條文": "A0000002",
                "憲法訴訟法": "A0030159",
                "行政程序法": "A0030055",
                "行政訴訟法": "A0030154",
                "國家賠償法": "I0020004",
            },
            "二、民法與民事訴訟法": {
                "民法": "B0000001",
                "民事訴訟法": "B0010001",
                "家事事件法": "B0010048",
                "強制執行法": "B0010004",
                "消費者保護法": "J0170001",
                "消費者保護法施行細則": "J0170002",
            },
            "三、刑法與刑事訴訟法": {
                "中華民國刑法": "C0000001",
                "刑事訴訟法": "C0010001",
                "國民法官法": "A0030320",
                "貪污治治罪條例": "C0010008",
            },
            "四、商事法": {
                "公司法": "J0080001",
                "證券交易法": "G0400001",
                "保險法": "G0390002",
                "票據法": "G0380028",
            },
            "五、經濟法規": {
                "商標法": "J0070001",
                "專利法": "J0070007",
                "專利法施行細則": "J0070008",
                "著作權法": "J0070017",
            },
            "六、其他法規": {
                "信託法": "I0020024",
            },
            "七、司法解釋": {
                "大法官解釋": "JUDGE_B1",
                "憲法法庭判決": "JUDGE_B5",
            }
        };

        let currentData = {};
        let currentLawName = "";
        let currentPCode = "";
        let globalCache = {}; // 記憶體快取
        let favorites = [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // 初始化導覽列
        function initNav() {
            const nav = document.getElementById('law-nav');
            nav.innerHTML = '';
            for (const [cat, laws] of Object.entries(LAWS_CONFIG)) {
                const catDiv = document.createElement('div');
                catDiv.className = 'category-item';
                catDiv.innerHTML = `<div class="category-title">${cat}</div>`;

                for (const [name, pcode] of Object.entries(laws)) {
                    const link = document.createElement('div');
                    link.className = 'law-link';
                    link.dataset.pcode = pcode;
                    link.innerText = name;
                    link.onclick = (e) => loadLaw(pcode, name, e.target);
                    catDiv.appendChild(link);
                }
                nav.appendChild(catDiv);
            }
        }

        // 初始化收藏夾
        async function initFavorites() {
            const list = document.getElementById('fav-list');
            try {
                const response = await fetch('law_data/favorites.json');
                favorites = await response.json();
                
                if (favorites.length === 0) {
                    list.innerHTML = '<div style="font-size:0.8rem; color:var(--text-secondary); padding:4px;">(暫無收藏)</div>';
                    return;
                }

                // 建立 PCode 轉名稱的查找表
                const pcodeMap = {};
                for (const laws of Object.values(LAWS_CONFIG)) {
                    for (const [name, pcode] of Object.entries(laws)) {
                        pcodeMap[pcode] = name;
                    }
                }

                list.innerHTML = '';
                favorites.forEach(pcode => {
                    const name = pcodeMap[pcode] || pcode;
                    const item = document.createElement('div');
                    item.className = 'fav-item';
                    item.innerText = name;
                    item.onclick = () => {
                        // 在 Treeview 中找到對應項並點擊
                        const target = document.querySelector(`.law-link[data-pcode="${pcode}"]`);
                        loadLaw(pcode, name, target);
                    };
                    list.appendChild(item);
                });
            } catch (e) {
                list.innerHTML = '<div style="font-size:0.8rem; color:var(--text-secondary); padding:4px;">(讀取失敗)</div>';
            }
        }

        function smartSort(keys) {
            return keys.sort((a, b) => {
                const aParts = a.split('-').map(p => parseInt(p) || 0);
                const bParts = b.split('-').map(p => parseInt(p) || 0);
                for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                    if ((aParts[i] || 0) !== (bParts[i] || 0)) {
                        return (aParts[i] || 0) - (bParts[i] || 0);
                    }
                }
                return a.localeCompare(b);
            });
        }

        function normalizeJudgeKey(raw) {
            raw = raw.trim();
            const m_cons = raw.match(/^(\d+)[-/](\d+)$/);
            if (m_cons) return `${m_cons[1]}年憲判字第${m_cons[2]}號`;
            if (/^\d+$/.test(raw)) return `釋字第${raw}號`;
            return raw.replace(/\s+/g, '');
        }

        async function loadLaw(pcode, name, element = null) {
            currentLawName = name;
            currentPCode = pcode;
            
            if (element) {
                document.querySelectorAll('.law-link').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
                element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            if (globalCache[pcode]) {
                currentData = globalCache[pcode];
                handleFullText(); // 自動顯示全文
                return true;
            }

            try {
                const response = await fetch(`law_data/${pcode}.json`);
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                
                currentData = {};
                for (let key in data) {
                    if (key !== "_metadata") currentData[key] = data[key];
                }
                globalCache[pcode] = currentData;
                
                handleFullText(); // 自動顯示全文
                return true;
            } catch (e) {
                renderMessage(`⚠️ 無法讀取資料 (${pcode}.json)`, true);
                return false;
            }
        }

        async function handleSearch() {
            let query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const isGlobal = document.getElementById('chk-global').checked;
            const btn = document.getElementById('btn-search');
            const area = document.getElementById('content-area');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="loading-spinner"></span>`;

            if (isGlobal) {
                await performGlobalSearch(query);
            } else {
                if (!currentPCode) {
                    renderMessage("⚠️ 請先在左側選擇法規，或勾選「跨法檢索」");
                } else {
                    area.innerHTML = '';
                    if (currentPCode.startsWith('JUDGE_')) query = normalizeJudgeKey(query);
                    
                    if (currentData[query]) {
                        renderArticle(query, currentData[query], currentLawName);
                    } else {
                        let found = 0;
                        const sortedKeys = smartSort(Object.keys(currentData));
                        for (let key of sortedKeys) {
                            if (key.includes(query) || currentData[key].includes(query)) {
                                renderArticle(key, currentData[key], currentLawName);
                                found++;
                            }
                        }
                        if (found === 0) renderMessage(`❌ 找不到關於「${query}」的條文`);
                    }
                }
            }

            highlight(query);
            btn.disabled = false;
            btn.innerHTML = `🔍 搜尋`;
        }

        async function handleFullText() {
            if (!currentPCode) return renderMessage("⚠️ 請先在左側選擇法規");
            
            const area = document.getElementById('content-area');
            area.innerHTML = `<div style="color:var(--accent-color); margin-bottom:20px; font-weight:bold; border-bottom:1px solid var(--border-color); padding-bottom:10px;">📜 ${currentLawName} - 全文閱覽</div>`;
            
            const sortedKeys = smartSort(Object.keys(currentData));
            sortedKeys.forEach(key => {
                renderArticle(key, currentData[key], currentLawName);
            });
            area.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function performGlobalSearch(query) {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div style="text-align:center; padding: 50px;"><span class="loading-spinner" style="width:30px; height:30px;"></span><p>正在檢索所有法規資料庫...</p></div>`;
            
            let results = [];
            let allLaws = [];
            for (const laws of Object.values(LAWS_CONFIG)) {
                for (const [name, pcode] of Object.entries(laws)) {
                    allLaws.push({ name, pcode });
                }
            }

            for (const law of allLaws) {
                await loadLaw(law.pcode, law.name);
                const data = globalCache[law.pcode];
                if (!data) continue;

                for (let [key, content] of Object.entries(data)) {
                    if (key.includes(query) || content.includes(query)) {
                        results.push({ lawName: law.name, pcode: law.pcode, key, content });
                    }
                }
            }

            area.innerHTML = '';
            if (results.length > 0) {
                area.insertAdjacentHTML('afterbegin', `<div style="color:var(--text-secondary); margin-bottom:20px; font-size:0.9rem;">🌐 全域搜尋結果：找到 ${results.length} 處匹配</div>`);
                results.forEach(res => renderArticle(res.key, res.content, res.lawName, res.pcode));
            } else {
                renderMessage(`❌ 在所有法規中皆找不到「${query}」`);
            }
        }

        function renderArticle(title, content, lawName, pcode = "") {
            const area = document.getElementById('content-area');
            const card = document.createElement('div');
            card.className = 'article-card';
            card.dataset.lawname = lawName;
            
            const displayTitle = (pcode || currentPCode).startsWith('JUDGE_') ? title : `第 ${title} 條`;
            const cleanContent = content.replace(/\xa0/g, ' ');
            
            card.innerHTML = `
                <div class="law-tag">${lawName}</div>
                <div class="article-title">${displayTitle}</div>
                <div class="article-body">${cleanContent}</div>
            `;
            area.appendChild(card);
        }

        function highlight(text) {
            if (!text || text.length < 2) return;
            const body = document.getElementById('content-area');
            const re = new RegExp(`(${text})`, "gi");
            const walk = (node) => {
                if (node.nodeType === 3) {
                    const span = document.createElement('span');
                    span.innerHTML = node.nodeValue.replace(re, '<mark style="background: rgba(56, 189, 248, 0.4); color: white; border-radius: 2px;">$1</mark>');
                    node.parentNode.replaceChild(span, node);
                } else if (node.nodeType === 1 && node.childNodes && !/(script|style)/i.test(node.tagName)) {
                    for (let i = 0; i < node.childNodes.length; i++) {
                        walk(node.childNodes[i]);
                    }
                }
            }
            document.querySelectorAll('.article-body, .article-title').forEach(el => walk(el));
        }

        function handleCopy() {
            const cards = document.querySelectorAll('.article-card');
            if (cards.length === 0) return alert("請先搜尋條文再複製");

            const includeName = document.getElementById('chk-include-name').checked;
            const useObsidian = document.getElementById('chk-obsidian').checked;

            let finalOutput = "";
            cards.forEach(card => {
                const lawName = card.dataset.lawname;
                const title = card.querySelector('.article-title').innerText;
                const body = card.querySelector('.article-body').innerText.replace(/\u200b/g, '');
                
                const titleLine = includeName ? `${lawName} ${title}` : title;

                if (useObsidian) {
                    finalOutput += `> [!law] ${titleLine}\n`;
                    finalOutput += body.split('\n').map(line => line.trim() ? `> ${line}` : `>`).join('\n') + "\n\n";
                } else {
                    finalOutput += `${titleLine}\n${body}\n\n`;
                }
            });

            navigator.clipboard.writeText(finalOutput).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "✅ 已複製！";
                setTimeout(() => btn.innerText = originalText, 2000);
            });
        }

        function renderMessage(msg, isError = false) {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div style="text-align: center; margin-top: 100px; color: ${isError ? '#f87171' : 'var(--text-secondary)'};">
                <p style="font-size: 1.1rem;">${msg}</p>
            </div>`;
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        initNav();
        initFavorites();
    </script>
</body>

</html>
