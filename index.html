<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexKo: Taiwanese Codex Engine</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --content-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: 12px;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 隱藏所有捲軸但保持捲動功能 */
        * {
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE/Edge */
        }

        *::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari/Edge */
        }

        /* 側邊欄遮罩 (手機版) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 45;
        }

        /* 左側導覽列 */
        aside {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        /* 桌面版收合邏輯：沒加 .open 時在窄版隱藏，在寬版則透過 margin 位移 */
        @media (min-width: 769px) {
            aside:not(.open) {
                margin-left: calc(-1 * var(--sidebar-width));
            }
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.4rem;
            font-family: Georgia, "Times New Roman", serif;
            font-weight: 700;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .favorites-section {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(56, 189, 248, 0.05);
        }

        .favorites-title {
            font-size: 0.75rem;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 8px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .fav-item {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .category-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .category-item {
            margin-bottom: 8px;
        }

        .category-title {
            padding: 8px 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .law-link {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .law-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .law-link.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
        }

        .fav-star {
            font-size: 1.1rem;
            color: var(--text-secondary);
            opacity: 0.3;
            transition: all 0.2s;
            padding: 2px 6px;
        }

        .law-link:hover .fav-star,
        .fav-star.active {
            opacity: 1;
        }

        .fav-star.active {
            color: #fbbf24;
        }

        .fav-star:hover {
            transform: scale(1.2);
        }

        /* 主顯示區 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            min-width: 0;
            position: relative;
        }

        header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .sidebar-toggle {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .options-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding-left: 48px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* 內容區 */
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            line-height: 1.8;
            transition: opacity 0.25s ease;
            scroll-padding-top: 20px;
            /* 確保定位時標題不貼邊 */
        }

        #content-area.loading {
            opacity: 0;
        }

        .article-card {
            background: var(--content-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            transition: border-color 0.3s, transform 0.3s;
        }

        @keyframes pulse-highlight {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(56, 189, 248, 0);
            }

            30% {
                transform: scale(1.01);
                box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(56, 189, 248, 0);
            }
        }

        .article-card.highlight-jump {
            border-color: var(--accent-color);
            animation: pulse-highlight 1.2s ease-out;
            z-index: 5;
        }

        .law-tag {
            font-size: 0.7rem;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 1px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .article-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .article-title {
            color: var(--accent-color);
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .article-title:hover {
            opacity: 0.8;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .mini-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .mini-btn:hover {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent-color);
        }

        .article-body {
            font-size: 1.05rem;
            white-space: pre-wrap;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 窄版優化 (手機 & Obsidian 側邊欄) */
        @media (max-width: 768px) {
            aside {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 280px;
                /* 手機版不要全螢幕寬，留一點空間點擊外面 */
                z-index: 100;
            }

            aside.open {
                transform: translateX(0);
            }

            aside.open+.sidebar-overlay {
                display: block;
            }

            .btn span {
                display: none;
            }

            .btn {
                padding: 10px;
                width: 40px;
                height: 40px;
                justify-content: center;
            }

            header {
                padding: 10px 12px;
            }

            .options-row {
                padding-left: 0;
                justify-content: center;
            }

            #content-area {
                padding: 12px;
            }

            .article-card {
                padding: 16px;
                border-radius: 12px;
            }
        }

        /* 歡迎頁面樣式 */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-logo {
            font-size: 4.5rem;
            font-family: "Arial Black", sans-serif;
            font-weight: 900;
            color: #1ABC9C;
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-shadow: 0 10px 30px rgba(26, 188, 156, 0.3);
        }

        /* 彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--accent-color);
        }

        .diary-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .diary-date {
            color: var(--accent-color);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .diary-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 50px;
            letter-spacing: 1px;
            text-transform: capitalize;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1100px;
            /* 放寬歡迎頁寬度 */
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 20px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .feature-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .kbd {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            color: var(--text-primary);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
    <aside id="sidebar">
        <div class="sidebar-header" onclick="location.hash=''; toggleSidebar(false);" style="cursor: pointer;">LexKo
            Codex</div>

        <div class="favorites-section" id="fav-section">
            <div class="favorites-title">⭐ 快速跳轉</div>
            <div id="fav-list">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>

        <div class="category-list" id="law-nav">
            <!-- 由 JS 動態生成 -->
        </div>
    </aside>

    <main>
        <header>
            <div class="search-row">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="收合/展開側邊欄">☰</button>
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="條號 (199-1) 或關鍵字...">
                </div>
                <button class="btn btn-primary" id="btn-search" onclick="handleSearch()">🔍<span> 搜尋</span></button>
                <button class="btn" style="background:rgba(255,255,255,0.1); color:white"
                    onclick="handleFullText()">📜<span> 全文</span></button>
            </div>

            <div class="options-row">
                <label class="checkbox-group">
                    <input type="checkbox" id="chk-include-name"> 帶入名稱
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="chk-obsidian" checked> Obsidian 格式
                </label>
                <label class="checkbox-group" title="搜尋所有已下載的法規">
                    <input type="checkbox" id="chk-global"> 跨法檢索
                </label>
            </div>
        </header>

        <div id="content-area">
            <div class="welcome-container">
                <div class="welcome-logo">LexKo</div>
                <div class="welcome-subtitle">Taiwanese codex engine</div>

                <div class="feature-grid">
                    <div class="feature-card">
                        <span class="feature-icon">🚀</span>
                        <div class="feature-title">快速別名跳轉</div>
                        <div class="feature-desc">直接搜尋 <span class="kbd">民184</span>、<span class="kbd">刑271</span>、
                            <span class="kbd">釋748</span>或<span class="kbd">112憲判18</span>，系統將自動切換法規並精確定位條文。
                        </div>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">🔍</span>
                        <div class="feature-title">智慧關鍵字檢索</div>
                        <div class="feature-desc">支援全文搜尋與高亮顯示。勾選「跨法檢索」可一次搜尋所有本地法規資料庫。</div>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">📝</span>
                        <div class="feature-title">Obsidian 連動優化</div>
                        <div class="feature-desc">預設輸出為 Obsidian Callout 格式。點擊條文標題即可複製，並自動保留易讀的換行結構。</div>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">⚡</span>
                        <div class="feature-title">極速操作體驗</div>
                        <div class="feature-desc">移除繁雜動畫，支援 <span class="kbd">Enter</span> 鍵搜尋與瞬間定位。專為法律實務與國考設計。</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const LAWS_CONFIG = {
            "一、憲法與行政法": {
                "中華民國憲法": "A0000001",
                "憲法增修條文": "A0000002",
                "憲法訴訟法": "A0030159",
                "行政程序法": "A0030055",
                "行政訴訟法": "A0030154",
                "國家賠償法": "I0020004",
            },
            "二、民法與民事訴訟法": {
                "民法": "B0000001",
                "民事訴訟法": "B0010001",
                "家事事件法": "B0010048",
                "強制執行法": "B0010004",
                "消費者保護法": "J0170001",
                "消費者保護法施行細則": "J0170002",
                "土地法": "D0060001",
            },
            "三、刑法與刑事訴訟法": {
                "中華民國刑法": "C0000001",
                "刑事訴訟法": "C0010001",
                "國民法官法": "A0030320",
            },
            "四、商事法": {
                "公司法": "J0080001",
                "證券交易法": "G0400001",
                "保險法": "G0390002",
                "票據法": "G0380028",
            },
            "五、經濟法規": {
                "商標法": "J0070001",
                "專利法": "J0070007",
                "專利法施行細則": "J0070008",
                "著作權法": "J0070017",
            },
            "六、其他法規": {
                "信託法": "I0020024",
                "勞動基準法": "N0030001",
            },
            "七、司法解釋": {
                "大法官解釋": "JUDGE_B1",
                "憲法法庭判決": "JUDGE_B5",
            }
        };

        const LAW_ALIASES = {
            "憲": "A0000001", "憲法": "A0000001",
            "憲增": "A0000002",
            "憲訴": "A0030159",
            "行程": "A0030055", "行政程序": "A0030055",
            "行": "A0030055", "行政": "A0030055",
            "行訴": "A0030154", "行政訴訟": "A0030154",
            "國賠": "I0020004",
            "民": "B0000001", "民法": "B0000001",
            "民訴": "B0010001",
            "家事": "B0010048", "家事法": "B0010048",
            "強執": "B0010004",
            "消保": "J0170001", "消保法": "J0170001",
            "消保細": "J0170002",
            "刑": "C0000001", "刑法": "C0000001",
            "刑訴": "C0010001",
            "國法": "A0030320",
            "公司": "J0080001", "公司法": "J0080001",
            "證交": "G0400001", "證券交易": "G0400001",
            "保險": "G0390002", "保險法": "G0390002",
            "票據": "G0380028", "票據法": "G0380028",
            "商標": "J0070001", "商標法": "J0070001",
            "專利": "J0070007", "專利法": "J0070007",
            "專利細": "J0070008",
            "著作": "J0070017", "著作權": "J0070017",
            "信託": "I0020024", "信託法": "I0020024",
            "勞基": "N0030001", "勞基法": "N0030001",
            "釋": "JUDGE_B1", "釋字": "JUDGE_B1",
            "憲判": "JUDGE_B5",
            "土": "D0060001", "土地": "D0060001"
        };

        let currentData = {};
        let currentLawName = "";
        let currentPCode = "";
        let globalCache = {};
        let favorites = [];

        function getNameFromPCode(pcode) {
            for (const cat of Object.values(LAWS_CONFIG)) {
                for (const [name, pc] of Object.entries(cat)) {
                    if (pc === pcode) return name;
                }
            }
            return null;
        }

        async function handleHashChange() {
            const hash = decodeURIComponent(location.hash.replace('#', ''));
            if (!hash) {
                renderMessage();
                currentPCode = "";
                document.querySelectorAll('.law-link').forEach(el => el.classList.remove('active'));
                return;
            }

            const parts = hash.split('-');
            const pcode = parts[0];
            const articleNum = parts[1];

            const name = getNameFromPCode(pcode);
            if (!name) return;

            const isJudge = pcode.startsWith('JUDGE_');
            const navLink = document.querySelector(`.law-link[data-pcode="${pcode}"]`);

            // 如果有 articleNum，則在載入全文時跳過置頂捲動 (skipFullTextScroll = true)
            await loadLaw(pcode, name, navLink, isJudge && !!articleNum, !!articleNum);

            if (articleNum) {
                const area = document.getElementById('content-area');
                if (isJudge) {
                    const targetKey = normalizeJudgeKey(articleNum, pcode);
                    if (currentData[targetKey]) {
                        area.innerHTML = '';

        function smartSort(keys) {
            // 如果 Key 帶有序號前綴 (如 00010_)，直接使用 localeCompare 即可完美排序
            if (keys.length > 0 && keys[0].match(/^\d{5}_/)) {
                return keys.sort();
            }
            // 否則使用舊有的智慧排序 (相容舊資料或司法解釋)
            return keys.sort((a, b) => {
                const getScore = (str) => {
                    const m1 = str.match(/(\d+)年憲判字第(\d+)號/);
                    if (m1) return parseInt(m1[1]) * 10000 + parseInt(m1[2]);
                    const m2 = str.match(/釋字第(\d+)號/);
                    if (m2) return parseInt(m2[1]);
                    return 0;
                };
                const scoreA = getScore(a);
                const scoreB = getScore(b);
                if (scoreA !== scoreB) return scoreA - scoreB;
                return a.localeCompare(b, undefined, { numeric: true });
            });
        }

        function normalizeJudgeKey(raw, pcode) {
            if (!raw) return "";
            // 強制過濾所有空格，避免匹配失敗
            raw = raw.toString().replace(/\s+/g, '');

            // 處理憲法法庭 (111-1 -> 111年憲判字第1號)
            let m_cons = raw.match(/^(\d+)[-/](\d+)$/);
            if (m_cons) return `${m_cons[1]}年憲判字第${m_cons[2]}號`;

            // 處理 112憲判18 -> 112年憲判字第18號
            let m_text = raw.match(/(\d+)(?:憲判|憲判字第)?(\d+)/);
            if (m_text && raw.includes('憲判')) return `${m_text[1]}年憲判字第${m_text[2]}號`;

            // 處理釋字各種格式 (釋字771, 釋771, 771 -> 釋字第771號)
            let m_shi = raw.match(/^(?:釋字|釋)?(?:第)?(\d+)(?:號)?$/);
            if (m_shi) {
                // 如果明確有「釋」或「釋字」，直接轉換
                if (raw.includes('釋')) return `釋字第${m_shi[1]}號`;
                // 如果只是純數字，則判斷是否在釋字區 (B1)
                if (pcode && (pcode.includes('INTERPRETATION') || pcode.includes('B1'))) {
                    return `釋字第${m_shi[1]}號`;
                }
            }

            return raw;
        }

        async function loadLaw(pcode, name, element = null, skipInitialDisplay = false, skipFullTextScroll = false) {
            const area = document.getElementById('content-area');
            area.classList.add('loading');

            currentLawName = name;
            currentPCode = pcode;

            if (window.innerWidth <= 768) {
                toggleSidebar(false);
            }

            if (element) {
                document.querySelectorAll('.law-link').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
                element.scrollIntoView({ behavior: 'auto', block: 'nearest' });
            }

            await new Promise(r => setTimeout(r, 100));

            const processData = (data) => {
                currentData = {};
                for (let key in data) {
                    if (key !== "_metadata") currentData[key] = data[key];
                }
                globalCache[pcode] = currentData;

                if (!skipInitialDisplay) {
                    handleFullText(skipFullTextScroll);
                }
                setTimeout(() => area.classList.remove('loading'), 50);

                // 選取後自動關閉側邊欄
                toggleSidebar(false);
            };

            if (globalCache[pcode]) {
                processData(globalCache[pcode]);
                return true;
            }

            try {
                const response = await fetch(`law_data/${pcode}.json`);
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                processData(data);
                return true;
            } catch (e) {
                renderMessage(`⚠️ 無法讀取資料 (${pcode}.json)`, true);
                area.classList.remove('loading');
                return false;
            }
        }

        async function handleSearch() {
            let query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const isGlobal = document.getElementById('chk-global').checked;
            const btn = document.getElementById('btn-search');
            const area = document.getElementById('content-area');

            btn.disabled = true;
            btn.innerHTML = `<span class="loading-spinner"></span>`;

            if (!isGlobal) {
                // 1. 傳統格式：中文字開頭 (如: 民184, 釋748)
                let fuzzyMatch = query.match(/^([\u4e00-\u9fa5]{1,4})(\d+[-\d]*)?$/);
                let pcode = "";
                let articleNum = "";

                if (fuzzyMatch) {
                    pcode = LAW_ALIASES[fuzzyMatch[1]];
                    articleNum = fuzzyMatch[2];
                }
                // 2. 憲判格式：數字開頭 (如: 112-18, 112憲判18)
                else if (query.match(/^(\d+)[-/](\d+)$/) || (query.match(/(\d+)憲判(\d+)/))) {
                    pcode = "JUDGE_B5";
                    articleNum = query;
                }

                if (pcode) {
                    const targetLawName = getNameFromPCode(pcode);
                    if (targetLawName) {
                        location.hash = articleNum ? `${pcode}-${articleNum}` : pcode;
                        btn.disabled = false;
                        btn.innerHTML = `🔍<span> 搜尋</span>`;
                        return;
                    }
                }
            }

            if (isGlobal) {
                await performGlobalSearch(query);
            } else {
                if (!currentPCode) {
                    renderMessage("⚠️ 請先在左側選擇法規，或勾選「跨法檢索」");
                } else {
                    if (currentPCode.startsWith('JUDGE_')) query = normalizeJudgeKey(query, currentPCode);

                    // 智慧匹配：優先找精確條號 Key，找不到再找帶序號的 Key (如 00010_A_1)
                    let targetKey = currentData[query] ? query : Object.keys(currentData).find(k => k.endsWith('_A_' + query));

                    if (targetKey) {
                        // 司法解釋：直接單獨渲染該筆
                        if (currentPCode.startsWith('JUDGE_')) {
                            area.innerHTML = '';
                            area.dataset.isFullText = "";
                            renderArticle(targetKey, currentData[targetKey], currentLawName);
                            area.scrollTo({ top: 0, behavior: 'auto' });
                        } else {
                            // 一般法規：確保已載入全文後跳轉
                            if (!area.dataset.isFullText) {
                                await handleFullText(true);
                            }
                            const targetCard = area.querySelector(`.article-card[data-key="${targetKey}"]`);
                            if (targetCard) {
                                targetCard.scrollIntoView({ behavior: 'auto', block: 'start' });
                                targetCard.classList.add('highlight-jump');
                                setTimeout(() => targetCard.classList.remove('highlight-jump'), 2000);
                            } else {
                                // Fallback: 如果還是沒找到，就單獨渲染
                                area.innerHTML = '';
                                area.dataset.isFullText = "";
                                renderArticle(targetKey, currentData[targetKey], currentLawName);
                                area.scrollTo({ top: 0, behavior: 'auto' });
                            }
                        }
                    } else {
                        area.innerHTML = '';
                        area.dataset.isFullText = "";
                        let found = 0;
                        const sortedKeys = smartSort(Object.keys(currentData));
                        for (let key of sortedKeys) {
                            if (key.includes(query) || currentData[key].includes(query)) {
                                renderArticle(key, currentData[key], currentLawName);
                                found++;
                            }
                        }
                        if (found === 0) {
                            if (currentPCode && currentPCode.startsWith('JUDGE_')) {
                                const isCons = currentLawName.includes('憲法法庭');
                                renderMessage(`❌ 查無資料，請輸入確切指令。<br><br>提示：如要查找 ${isCons ? '112年憲判字第18號' : '釋字第748號'}，請輸入 <span class="kbd">${isCons ? '112-18' : '748'}</span> 或 <span class="kbd">${isCons ? '112憲判18' : '釋字748'}</span>`);
                            } else {
                                renderMessage(`❌ 找不到關於「${query}」的條文`);
                            }
                        }
                        highlight(query);
                    }
                }
            }

            btn.disabled = false;
            btn.innerHTML = `🔍<span> 搜尋</span>`;
        }

        async function performGlobalSearch(query) {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div style="text-align:center; padding: 50px;"><span class="loading-spinner" style="width:30px; height:30px;"></span><p>正在檢索所有法規資料庫...</p></div>`;

            let results = [];
            let allLaws = [];
            for (const laws of Object.values(LAWS_CONFIG)) {
                for (const [name, pcode] of Object.entries(laws)) {
                    allLaws.push({ name, pcode });
                }
            }

            for (const law of allLaws) {
                await loadLaw(law.pcode, law.name);
                const data = globalCache[law.pcode];
                if (!data) continue;

                for (let [key, content] of Object.entries(data)) {
                    if (key.includes(query) || content.includes(query)) {
                        results.push({ lawName: law.name, pcode: law.pcode, key, content });
                    }
                }
            }

            area.innerHTML = '';
            if (results.length > 0) {
                area.insertAdjacentHTML('afterbegin', `<div style="color:var(--text-secondary); margin-bottom:20px; font-size:0.9rem;">🌐 全域搜尋結果：找到 ${results.length} 處匹配</div>`);
                results.forEach(res => renderArticle(res.key, res.content, res.lawName, res.pcode));
            } else {
                renderMessage(`❌ 在所有法規中皆找不到「${query}」`);
            }
        }

        function renderArticle(key, content, lawName, pcode = "") {
            const area = document.getElementById('content-area');
            const card = document.createElement('div');
            card.className = 'article-card';
            card.dataset.lawname = lawName;
            card.dataset.key = key;

            // 1. 解析 Key 格式
            // 優先支援新版帶序號 Key (格式: 00010_H_ID 或 00010_A_ID)
            const metaMatch = key.match(/^\d{5}_([HA])_(.*)$/);
            // 次要支援舊版空格 Key
            const isOldStandalone = !metaMatch && key.startsWith(' ');

            const type = metaMatch ? metaMatch[1] : (isOldStandalone ? 'H' : 'A');
            const displayID = metaMatch ? metaMatch[2] : key.trim();

            // 只有精確匹配 TITLE 或 PREAMBLE 時才使用「前言/標題框」
            const isSpecialHeader = type === 'H' && (displayID === 'TITLE' || displayID === 'PREAMBLE');

            if (type === 'H') {
                if (isSpecialHeader) {
                    // --- 前言與標題卡片 ---
                    card.style.borderLeft = "5px solid var(--accent-color)";
                    card.style.background = "rgba(56, 189, 248, 0.03)";
                    card.style.padding = "25px";
                    card.style.borderRadius = "12px";
                    card.style.marginBottom = "30px";
                    card.style.boxShadow = "inset 0 0 20px rgba(56, 189, 248, 0.05)";

                    const icon = displayID === 'TITLE' ? '📖' : '📜';
                    const label = displayID === 'TITLE' ? '法規名稱' : '前言 Preamble';

                    card.innerHTML = `
                        <div style="font-size: 0.85rem; color: var(--accent-color); font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;">
                            <span>${icon}</span> ${label}
                        </div>
                        <div style="font-style: ${displayID === 'TITLE' ? 'normal' : 'italic'}; color: var(--text-primary); line-height: 1.8; font-size: 1.1rem; letter-spacing: 0.5px; font-weight: ${displayID === 'TITLE' ? 'bold' : 'normal'}">
                            ${content || displayID}
                        </div>
                    `;
                } else {
                    // --- 普通編章節標題 (階層化樣式) ---
                    card.style.background = "transparent";
                    card.style.border = "none";
                    card.style.padding = "0";
                    card.style.marginBottom = "20px";
                    card.style.marginTop = "40px";
                    card.style.textAlign = "center";

                    const text = displayID.replace(/.*-H-/, '');
                    let fontSize = "1.2rem";
                    let fontWeight = "800";
                    let opacity = "1";

                    if (text.includes('編')) {
                        fontSize = "1.45rem";
                        fontWeight = "900";
                    } else if (text.includes('章')) {
                        fontSize = "1.25rem";
                        fontWeight = "800";
                    } else if (text.includes('節')) {
                        fontSize = "1.05rem";
                        fontWeight = "700";
                        opacity = "0.93";
                    }

                    card.innerHTML = `
                        <div style="color: var(--accent-color); font-size: ${fontSize}; font-weight: ${fontWeight}; letter-spacing: 2px; opacity: ${opacity};">
                            ${text}
                        </div>
                    `;
                }
            } else {
                // --- 一般條文樣式 ---
                // 只有當 ID 是純數字或符合條號模式時才加「第 條」
                const isNumeric = /^\d/.test(displayID);
                const displayTitle = (pcode || currentPCode).startsWith('JUDGE_') ? displayID :
                    (isNumeric ? `第 ${displayID} 條` : displayID);
                const cleanContent = content.replace(/\xa0/g, ' ');

                card.innerHTML = `
                    <div class="law-tag">${lawName}</div>
                    <div class="article-header">
                        <div class="article-title" onclick="copySingleArticle(this.closest('.article-card'))" title="點擊複製此條文">${displayTitle}</div>
                        <div class="card-actions">
                            <button class="mini-btn" onclick="copySingleArticle(this.closest('.article-card'))" title="複製此條文">📋</button>
                        </div>
                    </div>
                    <div class="article-body">${cleanContent}</div>
                `;
            }
            area.appendChild(card);
        }

        function highlight(text) {
            if (!text || text.length < 2) return;
            const body = document.getElementById('content-area');
            const re = new RegExp(`(${text})`, "gi");
            const walk = (node) => {
                if (node.nodeType === 3) {
                    const span = document.createElement('span');
                    span.innerHTML = node.nodeValue.replace(re, '<mark style="background: rgba(56, 189, 248, 0.4); color: white; border-radius: 2px;">$1</mark>');
                    node.parentNode.replaceChild(span, node);
                } else if (node.nodeType === 1 && node.childNodes && !/(script|style)/i.test(node.tagName)) {
                    for (let i = 0; i < node.childNodes.length; i++) {
                        walk(node.childNodes[i]);
                    }
                }
            }
            document.querySelectorAll('.article-body, .article-title').forEach(el => walk(el));
        }

        function syncCopy(text) {
            window.focus();
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let success = false;
            try {
                success = document.execCommand('copy');
            } catch (err) {
                console.error('execCommand error:', err);
            }
            document.body.removeChild(textArea);
            if (!success && navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).catch(err => console.error('Clipboard API error:', err));
                return true;
            }
            return success;
        }

        function copySingleArticle(card) {
            const lawName = card.dataset.lawname;
            const title = card.querySelector('.article-title').innerText;
            const body = card.querySelector('.article-body').innerText.replace(/\u200b/g, '');
            const includeName = document.getElementById('chk-include-name').checked;
            const useObsidian = document.getElementById('chk-obsidian').checked;
            const titleLine = includeName ? `${lawName} ${title}` : title;
            let output = "";
            if (useObsidian) {
                output = `> [!law] ${titleLine}\n`;
                output += body.split('\n').map(line => line.trim() ? `> ${line}` : `>`).join('\n') + "\n\n";
            } else {
                output = `${titleLine}\n${body}\n\n`;
            }
            const isCopied = syncCopy(output);
            if (isCopied) {
                const btn = card.querySelector('.mini-btn');
                const originalText = btn.innerText;
                btn.innerText = "✅";
                setTimeout(() => btn.innerText = originalText, 2000);
            }
        }
